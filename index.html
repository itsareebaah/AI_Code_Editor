<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚡ AI Code Editor — Pro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="styles.css" rel="stylesheet">
</head>
<body class="dark-theme">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-4 shadow-sm">
    <a class="navbar-brand fw-bold fs-4" href="#" style="color: white;">⚡ AI Code Editor</a>
    <div class="ms-auto d-flex gap-3 align-items-center">
      <select id="tierSelect" class="form-select form-select-sm">
        <option value="free">Free</option>
        <option value="pro">Pro</option>
      </select>
      <button id="themeToggle" class="btn btn-outline-light btn-sm">🌙 Dark</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container-fluid mt-4">
    <div class="row g-4">
      
      <!-- Code Editor Panel -->
      <div class="col-lg-7">
        <div class="panel">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>💻 Code Editor</h5>
            <select id="langSelect" class="form-select form-select-sm w-auto">
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="js">JavaScript</option>
              <option value="all">All</option>
            </select>
          </div>
          <textarea id="editor" placeholder="Write your code here..."></textarea>
          <div class="editor-actions">
            <button class="btn btn-primary btn-sm" id="explainBtn">Explain</button>
            <button class="btn btn-success btn-sm" id="improveBtn">Improve</button>
            <button class="btn btn-warning btn-sm" id="generateBtn">Generate</button>
            <button class="btn btn-outline-info btn-sm" id="saveSessionBtn">💾 Save</button>
            <button class="btn btn-outline-danger btn-sm" id="clearEditorBtn">🗑 Clear</button>
          </div>
        </div>
      </div>

      <!-- AI + Sessions Panel -->
      <div class="col-lg-5">
        <div class="panel mb-3">
          <h6>🧠 AI Prompt</h6>
          <textarea id="promptInput" class="form-control mb-2" rows="3" placeholder="Describe what you want to generate or fix..."></textarea>
          <button class="btn btn-primary btn-sm w-100" id="sendPromptBtn">Ask AI</button>
        </div>

        <div class="panel mb-3">
          <h6>🤖 AI Response</h6>
          <div id="resultBox"></div>
        </div>

        <div class="panel">
          <h6>📂 Saved Sessions</h6>
          <ul id="sessionList" class="list-group"></ul>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
